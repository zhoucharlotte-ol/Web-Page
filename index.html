<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Antonio's Art</title>
    <!--style sheet-->
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <!-- open graph meta tags-->
    <meta property="og:title" content="Antonio's Art">
        <meta property="og:description" content="A web app showcasing artwork created by Antonio Preza.">
        <meta property="og:image" content="">
        <meta property="og:type" content="website">
        <meta property="og:url" content="https://zhoucharlotte-ol.github.io/Web-Page/">
        <!--include google fonts-->
    </head>



    <body>
        <!--include nav bar--> <!--make sure to edit-->
        <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid px-10"> 
            <a class="navbar-brand fw-bold" href="index.html"><span class="text-success">Antonio's Art</span></a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="#catalog"></a>
            </a>
            </div>
        </div>
    </nav>


    <!--filter-->
    <main class="container-fluid px-5 my-5" id="catalog">
        <div class="row mb-4 align-items-center">
            <div class="col-md-8">
                <h2 class="fw-bold">Art Gallery</h2>
                <hr class="accent-hr">
            </div>
            <div class="col-md-4">
                <select id="sortSelect" class="form-select rounded-pill border-2 shadow-sm" onchange="handleSort()"> <!--continue this handle sort into the javascript in order to make the filter work-->
                    <option value="default">Default Order</option>
                    <option value="most-liked">Politics</option>
                    <option value="least-liked">Portraits</option>
                </select>
            </div>
        </div>



        <!--container where JavaScript pushes the Airtable data-->
        <div class="container-fluid tables">
            <div class="row g-3" id="content"></div>
        </div>

        <!--bootstrap js-->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
        <!--import javascript file for website-->
        <script src="script.js" defer></script>
    </body>
